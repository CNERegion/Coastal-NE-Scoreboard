<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal NE Region Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 740px; margin: 0 auto; }
  .header { text-align: center; padding: 2.5rem 1rem 2rem; background: #fff; border-radius: 16px; border: 1px solid #e2e0d8; margin-bottom: 1.25rem; }
  .brand { font-family: 'Playfair Display', Georgia, serif; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; color: #1a1a18; }
  .brand span { color: #1D9E75; }
  .tagline { font-size: 12px; color: #888780; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
  .week-label { font-size: 13px; color: #aaa9a2; margin-top: 6px; }
  .stats-bar   { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
  .stats-bar-2 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border-radius: 12px; border: 1px solid #e2e0d8; padding: 12px 8px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-num.green  { color: #1D9E75; }
  .stat-num.blue   { color: #185FA5; }
  .stat-num.purple { color: #534AB7; }
  .stat-num.teal   { color: #0F6E56; }
  .stat-label { font-size: 10px; color: #888780; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { padding: 7px 16px; border-radius: 24px; font-size: 13px; font-weight: 500; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .tab:hover { filter: brightness(1.1); }
  .tab.active { border: 2px solid #fff; box-shadow: 0 0 0 2px rgba(0,0,0,0.2); }
  .section { display: none; }
  .section.active { display: block; }
  .region-header { border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .region-header-top { display: flex; align-items: center; gap: 12px; padding: 12px 16px; flex-wrap: wrap; }
  .region-name { font-size: 16px; font-weight: 500; flex: 1; }
  .region-offices { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .region-totals { display: flex; gap: 6px; flex-wrap: wrap; }
  .region-pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .region-money { display: flex; gap: 16px; padding: 8px 16px 12px; flex-wrap: wrap; align-items: center; }
  .money-item { display: flex; flex-direction: column; gap: 2px; }
  .money-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.65; }
  .money-value { font-size: 14px; font-weight: 700; }
  .money-pct { font-size: 13px; font-weight: 900; color: #1a1a18 !important; }
  .above-ask-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .agent-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; border: 1px solid #e2e0d8; margin-bottom: 6px; background: #fff; transition: background 0.1s; flex-wrap: wrap; }
  .agent-row:hover { background: #f5f4f0; }
  .rank-num { font-size: 12px; font-weight: 500; color: #aaa9a2; min-width: 20px; text-align: center; }
  .agent-init { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .agent-name { font-size: 14px; font-weight: 500; }
  .pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .pill-closed    { background: #E1F5EE; color: #0F6E56; }
  .pill-pend      { background: #FBEAF0; color: #993556; }
  .pill-new       { background: #E6F1FB; color: #185FA5; }
  .pill-buyer     { background: #EEEDFE; color: #534AB7; }
  .pill-zero      { background: #f0efe8; color: #aaa9a2; font-style: italic; }
  .pill-withdrawn { background: #f0efe8; color: #888780; }
  .no-board-lbl { font-size: 11px; color: #aaa9a2; padding: 10px 2px 5px; text-transform: uppercase; letter-spacing: 1px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
  .summary-card { border-radius: 14px; padding: 16px; border: 1px solid #e2e0d8; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .summary-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .summary-region { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .summary-offices { font-size: 11px; margin-bottom: 12px; opacity: 0.65; }
  .summary-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .summary-stat:last-of-type { border-bottom: none; }
  .summary-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); }
  .standings { background: #fff; border-radius: 14px; border: 1px solid #e2e0d8; padding: 16px; margin-bottom: 1.25rem; }
  .standings-title { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .standing-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0efe8; }
  .standing-row:last-child { border-bottom: none; }
  .standing-rank { font-size: 13px; font-weight: 500; color: #aaa9a2; min-width: 20px; }
  .standing-name { font-size: 14px; font-weight: 500; flex: 1; }
  .standing-bar-wrap { width: 100px; height: 6px; background: #f0efe8; border-radius: 3px; overflow: hidden; }
  .standing-bar { height: 100%; border-radius: 3px; }
  .standing-pts { font-size: 13px; font-weight: 700; min-width: 44px; text-align: right; }
  .standing-money { font-size: 12px; color: #888780; min-width: 70px; text-align: right; }
  .leader-banner { border-radius: 12px; padding: 14px 18px; margin-bottom: 1.25rem; font-size: 13px; line-height: 1.6; border: 1px solid #9FE1CB; background: #E1F5EE; color: #0F6E56; }
  .scoring-note { font-size: 11px; color: #aaa9a2; text-align: center; padding: 1rem 0 0; }
  .ytd-agent-row { background: #fff; border: 1px solid #e2e0d8; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .ytd-rank { font-size: 13px; font-weight: 500; color: #aaa9a2; min-width: 24px; }
  .ytd-name { font-size: 15px; font-weight: 500; flex: 1; }
  .ytd-pts { font-size: 18px; font-weight: 700; }
  .ytd-conv { display: flex; gap: 8px; flex-wrap: wrap; padding-left: 34px; margin-bottom: 6px; }
  .ytd-sparkline { padding-left: 34px; display: flex; align-items: flex-end; gap: 3px; height: 28px; }
  .spark-bar { border-radius: 2px 2px 0 0; min-width: 6px; flex: 1; max-width: 18px; }
  .spark-zero { border-radius: 2px; background: #f0efe8; }
  .ytd-weeks-label { display: flex; gap: 3px; padding-left: 34px; margin-top: 3px; }
  .spark-week-label { font-size: 9px; color: #aaa9a2; flex: 1; max-width: 18px; text-align: center; overflow: hidden; white-space: nowrap; }
  .ytd-section-title { font-size: 14px; font-weight: 500; color: #1a1a18; margin: 1.5rem 0 0.75rem; padding-bottom: 6px; border-bottom: 1px solid #e2e0d8; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #aaa9a2; font-size: 14px; }
  .detail-banner { background:#fff; border-radius:14px; border:1px solid #e2e0d8; margin-top:1.25rem; overflow:hidden; }
  .detail-banner-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #e2e0d8; flex-wrap:wrap; gap:8px; }
  .detail-banner-title { font-size:13px; font-weight:500; color:#1a1a18; }
  .detail-filter-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .detail-filter-pill { font-size:12px; font-weight:500; padding:4px 14px; border-radius:20px; border:2px solid transparent; cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; }
  .detail-filter-pill:hover { filter:brightness(1.1); }
  .detail-filter-pill.active { border:2px solid #fff; box-shadow:0 0 0 2px rgba(0,0,0,0.15); }
  .detail-banner-body { padding:16px; display:none; }
  .detail-banner-body.open { display:block; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 1px solid #e2e0d8; border-radius: 0 0 10px 10px; overflow: hidden; }
  .detail-table th { padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 500; color: #888780; border-bottom: 1px solid #e2e0d8; background: #fafaf8; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-table td { padding: 8px 10px; border-bottom: 1px solid #f0efe8; color: #1a1a18; vertical-align: top; font-size: 12px; }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table tr:hover td { background: #fafaf8; }
  .detail-agent { font-weight: 500; }
  .detail-address { color: #5F5E5A; }

  /* ── PUBLISH COUNTDOWN BANNER ── */
  .countdown-banner { display:flex; align-items:center; gap:12px; background:#FAEEDA; border:1px solid #F5D49A; border-radius:12px; padding:12px 16px; margin-bottom:1.25rem; flex-wrap:wrap; }
  .countdown-icon { font-size:20px; flex-shrink:0; }
  .countdown-text { flex:1; min-width:180px; }
  .countdown-title { font-size:13px; font-weight:500; color:#854F0B; }
  .countdown-sub { font-size:11px; color:#AA6A1A; margin-top:2px; }
  .countdown-timer { font-size:15px; font-weight:700; color:#854F0B; white-space:nowrap; font-variant-numeric:tabular-nums; }

  /* ── LOADING STATE ── */
  .loading-state { text-align:center; padding:3rem 1rem; color:#aaa9a2; font-size:14px; }
  .loading-spinner { width:32px; height:32px; border:3px solid #e2e0d8; border-top-color:#1D9E75; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── GOOGLE DRIVE CONFIG NOTICE ── */
  .config-notice { background:#E6F1FB; border:1px solid #B8D4F0; border-radius:12px; padding:14px 16px; margin-bottom:1.25rem; font-size:12px; color:#185FA5; line-height:1.6; }
  .config-notice strong { font-weight:500; }

  /* ── MOBILE LAYOUT ─────────────────────────────────────────────────────── */
  @media (max-width:600px) {
    .page { padding:10px; }

    /* Header */
    .brand { font-size:28px; }
    .tagline { font-size:10px; letter-spacing:2px; }
    .week-label { font-size:11px; }

    /* Stats bar */
    .stats-bar, .stats-bar-2 { grid-template-columns:repeat(2,1fr); gap:8px; }
    .stat-card { padding:10px 8px; }
    .stat-num { font-size:22px; }
    .stat-label { font-size:9px; }

    /* Tabs */
    .tabs { gap:4px; flex-wrap:wrap; justify-content:center; }
    .tab { padding:6px 10px; font-size:11px; border-radius:20px; }

    /* Week nav */
    #week-nav-bar { padding:0; }
    #week-nav-bar > div { padding:6px 10px; gap:6px; }

    /* Summary grid - stack vertically */
    .summary-grid { grid-template-columns:1fr; gap:10px; }
    .summary-card { padding:14px; }
    .summary-region { font-size:16px; }

    /* Region header */
    .region-header-top { flex-direction:column; align-items:flex-start; gap:8px; }
    .region-totals { flex-wrap:wrap; gap:4px; }
    .region-money { grid-template-columns:repeat(2,1fr); gap:8px; }
    .money-item { padding:6px; }
    .money-label { font-size:10px; }
    .money-value { font-size:13px; }

    /* Detail table - make it scrollable */
    .detail-table { font-size:11px; }
    .detail-table th, .detail-table td { padding:6px 6px; }
    .detail-address { max-width:100px; word-break:break-word; }

    /* Leader banner */
    .leader-banner { font-size:13px; padding:10px 14px; }

    /* Standing rows */
    .standing-row { gap:6px; }
    .standing-bar-wrap { min-width:60px; }
    .standing-money { min-width:55px; font-size:11px; }

    /* YTD agent cards */
    .ytd-agent-grid { grid-template-columns:1fr; }

    /* Countdown banner */
    .publish-countdown { flex-direction:column; gap:4px; text-align:center; font-size:12px; }

    /* Overflow tables scroll horizontally */
    .detail-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  }

  /* ── MOBILE ────────────────────────────────────────────────────────────── */
  @media (max-width:600px) {
    .page { padding:10px; }
    .brand { font-size:26px; }
    .tagline { font-size:10px; letter-spacing:1.5px; }
    .week-label { font-size:11px; }
    .stats-bar, .stats-bar-2 { grid-template-columns:repeat(2,1fr); gap:8px; }
    .stat-card { padding:10px 8px; }
    .stat-num { font-size:22px; }
    .stat-label { font-size:9px; }
    .tabs { gap:4px; flex-wrap:wrap; justify-content:center; }
    .tab { padding:5px 10px; font-size:11px; }
    .summary-grid { grid-template-columns:1fr; gap:10px; }
    .summary-card { padding:12px; }
    .summary-region { font-size:15px; }
    .region-header-top { flex-direction:column; align-items:flex-start; gap:8px; }
    .region-totals { flex-wrap:wrap; gap:4px; }
    .region-money { grid-template-columns:repeat(2,1fr); gap:8px; }
    .money-label { font-size:10px; }
    .money-value { font-size:13px; }
    .leader-banner { font-size:12px; padding:10px 12px; }
    .standing-row { gap:4px; font-size:12px; }
    .standing-bar-wrap { min-width:50px; }
    .standing-money { min-width:50px; font-size:11px; }
    .detail-table { font-size:11px; white-space:nowrap; border-collapse:collapse; }
    .detail-table th, .detail-table td { padding:5px 10px; }
    .detail-table th:nth-child(1), .detail-table td:nth-child(1) { min-width:140px; }
    .detail-table th:nth-child(2), .detail-table td:nth-child(2) { min-width:200px; }
    .detail-table th:nth-child(3), .detail-table td:nth-child(3) { min-width:140px; }
    .detail-table th:nth-child(4), .detail-table td:nth-child(4) { min-width:90px; }
    .detail-table th:nth-child(5), .detail-table td:nth-child(5) { min-width:90px; }
    .detail-table th:nth-child(6), .detail-table td:nth-child(6) { min-width:70px; }
    .ytd-agent-card { padding:10px 12px; }
    #week-nav-bar > div { padding:6px 8px; gap:5px; }
    #week-nav-bar select { font-size:11px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="brand">Coastal NE <span>Region</span></div>
    <div class="tagline">NH &middot; ME &middot; MA</div>
    <div class="week-label" id="current-week-label">Loading…</div>
  </div>

  <!-- Countdown banner — shown when pending week not yet published -->
  <div class="countdown-banner" id="countdown-banner" style="display:none">
    <div class="countdown-icon">🕐</div>
    <div class="countdown-text">
      <div class="countdown-title">Next update publishes Monday at 5:00 PM ET</div>
      <div class="countdown-sub" id="countdown-sub">Showing last published scoreboard</div>
    </div>
    <div class="countdown-timer" id="countdown-timer">—</div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num blue"   id="stat-new">—</div><div class="stat-label">New Listings</div></div>
    <div class="stat-card"><div class="stat-num purple" id="stat-buyer">—</div><div class="stat-label">Buyer Agr.</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#993556" id="stat-pend">—</div><div class="stat-label">Pending</div></div>
  </div>
  <div class="stats-bar-2">
    <div class="stat-card"><div class="stat-num green"  id="stat-closed">—</div><div class="stat-label">Closed</div></div>
    <div class="stat-card"><div class="stat-num teal"   id="stat-sold-vol">—</div><div class="stat-label">Total Sold $</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#1a1a18;font-weight:900" id="stat-lts-pct">—</div><div class="stat-label">List-to-Sold %</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" style="background:#1a1a18;color:#fff;border-color:transparent" onclick="showTab('summary',this,'#1a1a18')">Regional Summary</button>
    <button class="tab" style="background:#185FA5;color:#fff;border-color:transparent" onclick="showTab('seacoast',this,'#185FA5')">Seacoast NH</button>
    <button class="tab" style="background:#993556;color:#fff;border-color:transparent" onclick="showTab('ma',this,'#993556')">Massachusetts</button>
    <button class="tab" style="background:#0F6E56;color:#fff;border-color:transparent" onclick="showTab('maine',this,'#0F6E56')">Maine</button>
    <button class="tab" style="background:#ff00ff;color:#fff;border-color:transparent;font-weight:700" onclick="showTab('ytd',this,'#ff00ff')">YTD</button>
  </div>

  <div id="week-nav-bar" style="display:none;margin-bottom:1.25rem;"></div>

  <div class="section active" id="tab-summary"><div id="summary-content"></div></div>
  <div class="section" id="tab-seacoast"><div id="seacoast-content"></div></div>
  <div class="section" id="tab-ma"><div id="ma-content"></div></div>
  <div class="section" id="tab-maine"><div id="maine-content"></div></div>
  <div class="section" id="tab-ytd"><div id="ytd-content"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// GOOGLE DRIVE CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════════
// After setup, replace DRIVE_FILE_ID with the ID from your shared JSON file in Drive.
// The file ID is the long string in the Google Drive share URL:
//   https://drive.google.com/file/d/YOUR_FILE_ID_HERE/view
//
// IMPORTANT: The file must be shared as "Anyone with the link can view"
// so the scoreboard can read it. The admin file writes to it, this file reads it.
// ═══════════════════════════════════════════════════════════════════════════════

// Publish schedule: Monday = day 1, hour 17 = 5pm ET
const PUBLISH_DAY  = 1;   // Monday
const PUBLISH_HOUR = 17;  // 5pm
const PUBLISH_TZ   = 'America/New_York';

// ═══════════════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════════
const MY_OFFICES=['exeter','portsmouth','andover','bradford','methuen','newburyport','saco','kennebunk'];
const REGIONS=[
  {id:'seacoast',name:'Seacoast NH',  offices:['exeter','portsmouth'],                       label:'Exeter · Portsmouth',                       color:'#185FA5',bg:'#E6F1FB',barColor:'#378ADD'},
  {id:'ma',      name:'Massachusetts',offices:['andover','bradford','methuen','newburyport'],label:'Andover · Bradford · Methuen · Newburyport',color:'#993556',bg:'#FBEAF0',barColor:'#ED93B1'},
  {id:'maine',   name:'Maine',        offices:['saco','kennebunk'],                           label:'Saco · Kennebunk',                           color:'#0F6E56',bg:'#E1F5EE',barColor:'#5DCAA5'},
];
const AVATAR_COLORS=[
  {bg:'#E1F5EE',color:'#0F6E56'},{bg:'#E6F1FB',color:'#185FA5'},
  {bg:'#FAEEDA',color:'#854F0B'},{bg:'#FBEAF0',color:'#993556'},
  {bg:'#EEEDFE',color:'#534AB7'},{bg:'#FAECE7',color:'#993C1D'},
];
const STATUS_RANK={'NEW':1,'PEND':2,'CLOSED':3,'WITHDRAWN':1,'TERMINATED':1,'FALL THRU':0};
let _currentWeekIdx=-1;
let _ytdData={weeks:[]};

// ═══════════════════════════════════════════════════════════════════════════════
// PUBLISH GATE — determines if new week should be visible yet
// ═══════════════════════════════════════════════════════════════════════════════
function isPublishTime(){
  // Get current time in ET
  const now=new Date();
  const etStr=now.toLocaleString('en-US',{timeZone:PUBLISH_TZ});
  const et=new Date(etStr);
  const day=et.getDay();   // 0=Sun,1=Mon,...6=Sat
  const hour=et.getHours();
  const minute=et.getMinutes();
  // Monday at or after 5:00pm ET = published
  if(day>PUBLISH_DAY) return true;
  if(day===PUBLISH_DAY && (hour>PUBLISH_HOUR || (hour===PUBLISH_HOUR && minute>=0))) return true;
  return false;
}

function getPublishedWeeks(allWeeks){
  // Weeks are stored with a publishAt timestamp set by the admin.
  // On the public side, we only show weeks where publishAt <= now (Monday 5pm ET)
  // OR where the week was loaded before the current publish window.
  // Simple rule: if it's past Monday 5pm ET, show all weeks.
  // If not, show only weeks marked as published (publishedAt is set and in the past).
  const now=new Date();
  return allWeeks.filter(w=>{
    if(!w.publishAt) return true; // legacy weeks always show
    return new Date(w.publishAt)<=now;
  });
}

function nextPublishTime(){
  const now=new Date();
  const etStr=now.toLocaleString('en-US',{timeZone:PUBLISH_TZ});
  const et=new Date(etStr);
  // Find next Monday at 5pm ET
  const day=et.getDay();
  let daysUntilMonday=(1-day+7)%7;
  if(daysUntilMonday===0){
    // It's Monday — check if before 5pm
    if(et.getHours()<17||(et.getHours()===17&&et.getMinutes()===0)) daysUntilMonday=0;
    else daysUntilMonday=7;
  }
  const next=new Date(et);
  next.setDate(et.getDate()+daysUntilMonday);
  next.setHours(17,0,0,0);
  // Convert back to UTC
  const diffMs=next-et;
  return new Date(now.getTime()+diffMs);
}

function formatCountdown(targetDate){
  const now=new Date();
  let diff=Math.max(0,targetDate-now);
  const days=Math.floor(diff/86400000); diff-=days*86400000;
  const hours=Math.floor(diff/3600000); diff-=hours*3600000;
  const mins=Math.floor(diff/60000);    diff-=mins*60000;
  const secs=Math.floor(diff/1000);
  if(days>0) return `${days}d ${hours}h ${mins}m`;
  if(hours>0) return `${hours}h ${mins}m ${secs}s`;
  return `${mins}m ${secs}s`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// YTD AGENT BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
function buildYTDAgents(weeks,filterRegionId){
  const registry={};const agentPts={};const agentMeta={};const agentWeeklyPts={};const agentBuyer={};
  weeks.forEach((week,wi)=>{
    const weekNewPts={};
    Object.entries(week.weekDeals||{}).forEach(([dk,d])=>{
      const ak=agentKey(d.name);
      if(!agentMeta[ak])agentMeta[ak]={name:d.name,office:d.office,regionId:getRegionId(d.office)};
      if(!agentPts[ak])agentPts[ak]=0;
      if(!agentWeeklyPts[ak])agentWeeklyPts[ak]=new Array(weeks.length).fill(0);
      if(!registry[dk]&&['CLOSED','PEND','NEW'].includes(d.status)){
        registry[dk]={agentKey:ak,weekIdx:wi,firstStatus:d.status};
        agentPts[ak]+=1;weekNewPts[ak]=(weekNewPts[ak]||0)+1;
      }
    });
    Object.values(week.agents||{}).forEach(a=>{
      if(!a.buyer)return;
      const ak=agentKey(a.name);
      if(!agentMeta[ak])agentMeta[ak]={name:a.name,office:a.office,regionId:getRegionId(a.office)};
      if(!agentPts[ak])agentPts[ak]=0;
      if(!agentWeeklyPts[ak])agentWeeklyPts[ak]=new Array(weeks.length).fill(0);
      if(!agentBuyer[ak])agentBuyer[ak]=0;
      agentBuyer[ak]+=a.buyer;agentPts[ak]+=a.buyer;weekNewPts[ak]=(weekNewPts[ak]||0)+a.buyer;
    });
    Object.entries(weekNewPts).forEach(([ak,pts])=>{
      if(!agentWeeklyPts[ak])agentWeeklyPts[ak]=new Array(weeks.length).fill(0);
      agentWeeklyPts[ak][wi]=pts;
    });
  });
  const dealCurrentStatus={};const dealSideInfo={};const dealPrices={};
  weeks.forEach(week=>{
    Object.entries(week.weekDeals||{}).forEach(([dk,d])=>{
      dealCurrentStatus[dk]=d.status;
      dealSideInfo[dk]={isBoth:d.notes.includes('both sides'),isListSide:d.notes.includes('list side')||d.notes.includes('both sides'),isBuySide:d.notes.includes('buy side')||d.notes.includes('both sides')};
      dealPrices[dk]={listP:d.listP||0,soldP:d.soldP||0};
    });
  });
  const agentTruth={};
  Object.keys(agentMeta).forEach(ak=>{agentTruth[ak]={listings:0,pendings:0,closings:0,withdrawn:0,terminated:0,fallThru:0,listSideListings:0,everListSide:0,pendList:0,pendBuy:0,pendBoth:0,closedList:0,closedBuy:0,closedBoth:0,listedVal:0,pipelineVal:0,closedVal:0};});
  Object.entries(registry).forEach(([dk,info])=>{
    const ak=info.agentKey;if(!agentTruth[ak])return;
    const st=dealCurrentStatus[dk]||info.firstStatus;const si=dealSideInfo[dk]||{};const pr=dealPrices[dk]||{listP:0,soldP:0};
    if(si.isListSide||si.isBoth)agentTruth[ak].everListSide++;
    if(st==='NEW'){agentTruth[ak].listings++;agentTruth[ak].listedVal+=pr.listP;if(si.isListSide||si.isBoth)agentTruth[ak].listSideListings++;}
    else if(st==='PEND'){agentTruth[ak].pendings++;agentTruth[ak].pipelineVal+=pr.listP;if(si.isBoth)agentTruth[ak].pendBoth++;else if(si.isListSide)agentTruth[ak].pendList++;else if(si.isBuySide)agentTruth[ak].pendBuy++;}
    else if(st==='CLOSED'){agentTruth[ak].closings++;agentTruth[ak].closedVal+=pr.soldP||pr.listP;if(si.isBoth)agentTruth[ak].closedBoth++;else if(si.isListSide)agentTruth[ak].closedList++;else if(si.isBuySide)agentTruth[ak].closedBuy++;}
    else if(st==='WITHDRAWN'){agentTruth[ak].withdrawn++;agentTruth[ak].listedVal+=pr.listP;if(si.isListSide||si.isBoth)agentTruth[ak].listSideListings++;}
    else if(st==='TERMINATED'){agentTruth[ak].terminated++;agentTruth[ak].listedVal+=pr.listP;if(si.isListSide||si.isBoth)agentTruth[ak].listSideListings++;}
    else if(st==='FALL THRU'){agentTruth[ak].fallThru++;}
  });
  const result={};
  Object.keys(agentMeta).forEach(ak=>{
    if(filterRegionId&&agentMeta[ak].regionId!==filterRegionId)return;
    result[ak]={...agentMeta[ak],points:agentPts[ak]||0,truth:{...agentTruth[ak],buyer:agentBuyer[ak]||0},weeklyPts:agentWeeklyPts[ak]||[]};
  });
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════════
// MONEY CALCULATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function calcRegionMoney(deals,regionId){
  const rd=deals.filter(d=>d.regionId===regionId);
  let soldTotal=0,closedListTotal=0,pendTotal=0,newTotal=0,aboveAsk=0;
  rd.forEach(d=>{
    if(d.status==='CLOSED'){soldTotal+=d.soldP;closedListTotal+=d.listP;if(d.soldP>d.listP)aboveAsk++;}
    else if(d.status==='PEND')pendTotal+=d.listP;
    else if(d.status==='NEW')newTotal+=d.listP;
  });
  return{soldTotal,pendTotal,newTotal,aboveAsk,ltsPct:closedListTotal>0?(soldTotal/closedListTotal)*100:0};
}

function buildActivityPanel(panel,weekDeals,agents,regionId,r){
  const filtered=Object.values(weekDeals).filter(d=>d.regionId===regionId);
  if(!filtered.length){panel.innerHTML='<div style="color:#aaa9a2;font-size:13px">No transactions this week.</div>';return;}
  const sections={NEW:{label:'New Listings',color:'#185FA5',deals:[]},PEND:{label:'Pending',color:'#993556',deals:[]},CLOSED:{label:'Closed',color:'#1D9E75',deals:[]},OTHER:{label:'Withdrawn / Fall Thru / Terminated',color:'#888780',deals:[]}};
  filtered.forEach(d=>{if(d.status==='NEW')sections.NEW.deals.push(d);else if(d.status==='PEND')sections.PEND.deals.push(d);else if(d.status==='CLOSED')sections.CLOSED.deals.push(d);else sections.OTHER.deals.push(d);});
  renderDealSection('NEW',sections.NEW,panel);
  renderBuyerTable(Object.values(agents||{}).filter(a=>a.buyer>0&&a.regionId===regionId),panel);
  renderDealSection('PEND',sections.PEND,panel);renderDealSection('CLOSED',sections.CLOSED,panel);renderDealSection('OTHER',sections.OTHER,panel);
}

function renderSparkline(weeklyPts,color){
  const max=Math.max(...weeklyPts,1);
  return'<div class="ytd-sparkline">'+weeklyPts.map(p=>p===0?`<div class="spark-bar spark-zero" style="height:4px"></div>`:`<div class="spark-bar" style="height:${Math.max(4,Math.round((p/max)*24))}px;background:${color}"></div>`).join('')+'</div>';
}

function renderYTDAgentLeaderboard(containerId,ytdAgents,weeks){
  const el=document.getElementById(containerId);
  const medals=['🥇','🥈','🥉'];
  const list=Object.values(ytdAgents).sort((a,b)=>b.points-a.points);
  list.filter(a=>a.points>0).forEach((a,i)=>{
    const c=AVATAR_COLORS[i%AVATAR_COLORS.length];const t=a.truth||{};
    const row=document.createElement('div');row.className='ytd-agent-row';
    let breakdown='';
    const totalListed=(t.listings||0)+(t.withdrawn||0)+(t.terminated||0);
    if(totalListed)breakdown+=`<span class="pill pill-new">${totalListed} listed${sideBreakdown(t.listSideListings||0,(totalListed-(t.listSideListings||0)),0)}</span>`;
    if(t.buyer)breakdown+=`<span class="pill pill-buyer">${t.buyer} buyer agr.</span>`;
    if(t.pendings)breakdown+=`<span class="pill pill-pend">${t.pendings} pending${sideBreakdown(t.pendList||0,t.pendBuy||0,t.pendBoth||0)}</span>`;
    if(t.closings)breakdown+=`<span class="pill pill-closed">${t.closings} closed${sideBreakdown(t.closedList||0,t.closedBuy||0,t.closedBoth||0)}</span>`;
    if(t.withdrawn)breakdown+=`<span class="pill pill-withdrawn">${t.withdrawn} WTDN</span>`;
    if(t.terminated)breakdown+=`<span class="pill pill-withdrawn">${t.terminated} TERM</span>`;
    if(t.fallThru)breakdown+=`<span class="pill pill-withdrawn">${t.fallThru} FT</span>`;
    const ytdTotalVal=(t.listedVal||0)+(t.pipelineVal||0)+(t.closedVal||0);
    let convHtml='';
    if(weeks.length>1){
      const everListSide=t.everListSide||0;const listSideClosings=(t.closedList||0)+(t.closedBoth||0);
      const lPct=everListSide>0?Math.round((listSideClosings/everListSide)*100):null;
      const pendResolved=t.closings+(t.pendings||0);const pPct=pendResolved>0&&t.closings>0?Math.round((t.closings/pendResolved)*100):null;
      if(lPct!==null||pPct!==null){

        if(pPct!==null)convHtml+=`<span style="font-size:11px;font-weight:500;color:#993556;background:#FBEAF0;padding:2px 8px;border-radius:20px">⏳ Pending conv. ${pPct}% · ${t.closings} of ${pendResolved} closed</span>`;
        convHtml+='</div>';
      }
    }
    const spark=weeks.length>1&&a.weeklyPts&&a.weeklyPts.length>0?renderSparkline(a.weeklyPts,'#1D9E75'):'';
    const weekLabels=weeks.map(w=>{const m=w.label.match(/\d+/);const num=m?parseInt(m[0]):0;return`<div class="spark-week-label">w${num<10?'0'+num:num}</div>`;}).join('');
    row.innerHTML=`
      <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px">
        <div class="ytd-rank">${i<3?medals[i]:i+1}</div>
        <div class="agent-init" style="background:${c.bg};color:${c.color};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0">${initials(a.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <div><div class="ytd-name">${a.name}</div><div style="font-size:11px;color:#aaa9a2">${a.office||''}</div></div>
            <div class="ytd-pts" style="color:#1D9E75;flex-shrink:0;margin-left:8px">${a.points} pts</div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
            <div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center">${breakdown}</div>

          </div>
        </div>
      </div>
      ${convHtml}${spark}
      ${weeks.length>1?`<div class="ytd-weeks-label">${weekLabels}</div>`:''}`;
    el.appendChild(row);
  });
  const noAct=list.filter(a=>a.points===0);
  if(noAct.length){
    const lbl=document.createElement('div');lbl.className='no-board-lbl';lbl.textContent='Not yet on the board';el.appendChild(lbl);

    });
  }

function renderYTD(){
  const el=document.getElementById('ytd-content');el.innerHTML='';
  const ytd=loadYTD();
  if(!ytd.weeks.length){el.innerHTML='<div class="empty-state">No YTD data available yet.</div>';return;}
  const allDeals=ytd.weeks.flatMap(w=>w.deals||[]);

  // ── YTD REGION CARDS ─────────────────────────────────────────────────────
  const ytdRegAgents={};
  ytd.weeks.forEach(week=>{
    Object.entries(week.agents||{}).forEach(([key,a])=>{
      if(!ytdRegAgents[key])ytdRegAgents[key]={...a,buyer:0};
      ytdRegAgents[key].closed=Math.max(ytdRegAgents[key].closed||0,a.closed||0);
      ytdRegAgents[key].pend=Math.max(ytdRegAgents[key].pend||0,a.pend||0);
      ytdRegAgents[key].newL=Math.max(ytdRegAgents[key].newL||0,a.newL||0);
      ytdRegAgents[key].buyer=(ytdRegAgents[key].buyer||0)+(a.buyer||0);
    });
  });
  // Build region cards + standing bars only — no weekly panels
  const allStats=REGIONS.map(r=>{
    const list=Object.values(ytdRegAgents).filter(a=>a.regionId===r.id);
    const money=calcRegionMoney(allDeals,r.id);
    return{...r,stats:{closed:list.reduce((s,a)=>s+(a.closed||0),0),pend:list.reduce((s,a)=>s+(a.pend||0),0),newL:list.reduce((s,a)=>s+(a.newL||0),0),buyer:list.reduce((s,a)=>s+(a.buyer||0),0),buyerAgency:list.reduce((s,a)=>s+(a.buyerAgency||0),0),showing:list.reduce((s,a)=>s+(a.showing||0),0),facilitator:list.reduce((s,a)=>s+(a.facilitator||0),0),pts:list.reduce((s,a)=>s+weeklyScore(a),0)},money};
  });
  const maxPts=Math.max(...allStats.map(r=>r.stats.pts),1);
  const grid=document.createElement('div');grid.className='summary-grid';
  allStats.forEach(r=>{
    const s=r.stats,m=r.money,isLeader=s.pts===maxPts&&s.pts>0;
    const card=document.createElement('div');card.className='summary-card';card.style.cssText=`background:${r.bg};border-color:${r.bg}`;
    card.innerHTML=`
      <div class="summary-region" style="color:${r.color}">${r.name}${isLeader?' 🏆':''}</div>
      <div class="summary-offices" style="color:${r.color}">${r.label}</div>

      <div class="summary-stat"><span style="color:${r.color};opacity:.7">${s.buyer} Buyer${s.buyer!==1?'s':''}</span><span style="color:#534AB7;font-weight:500;font-size:11px">${[s.buyerAgency>0?s.buyerAgency+' Buy':'',s.showing>0?s.showing+' Sho':'',s.facilitator>0?s.facilitator+' Fac':''].filter(Boolean).join(' / ')||'—'}</span></div>
      <div class="summary-stat"><span style="color:${r.color};opacity:.7">${s.pend} Pending${s.pend!==1?'s':''}</span><span style="color:${r.color};font-weight:500">${m.pendTotal>0?fmtMoney(m.pendTotal):'—'}</span></div>
      <div class="summary-stat"><span style="color:${r.color};opacity:.7">${s.closed} Closed</span><span style="color:${r.color};font-weight:500">${m.soldTotal>0?fmtMoney(m.soldTotal):'—'}</span></div>
      <div class="summary-stat"><span style="color:${r.color};opacity:.7">List-to-sold</span><span style="color:${r.color};font-weight:500">${m.ltsPct>0?fmtPct(m.ltsPct):'—'}</span></div>
      <div class="summary-total" style="color:${r.color}"><span>Above ask</span><span>${m.aboveAsk} deal${m.aboveAsk!==1?'s':''}</span></div>`;
    grid.appendChild(card);

  el.appendChild(grid);

  // Leader banner
  const sorted=[...allStats].sort((a,b)=>b.stats.pts-a.stats.pts);

  const note=document.createElement('div');note.className='scoring-note';

  const ytdAgents=buildYTDAgents(ytd.weeks);
  const lbWrap=document.createElement('div');lbWrap.style.cssText='margin-top:12px;border-radius:10px;border:1px solid #e2e0d8;overflow:hidden;background:#fff';

  const lbHdrBottom=document.createElement('div');lbHdrBottom.style.cssText='display:none;align-items:center;justify-content:center;padding:8px 14px;background:#fafaf8;border-top:1px solid #e2e0d8;cursor:pointer;user-select:none';

  lbWrap.appendChild(lbHdrTop);lbWrap.appendChild(lbBoard);lbWrap.appendChild(lbHdrBottom);

}

function updateStatsBar(agentMap,deals){
  const vals=Object.values(agentMap);
  document.getElementById('stat-new').textContent    =vals.reduce((s,a)=>s+(a.newL||0),0);
  document.getElementById('stat-buyer').textContent  =vals.reduce((s,a)=>s+(a.buyer||0),0);
  document.getElementById('stat-pend').textContent   =vals.reduce((s,a)=>s+(a.pend||0),0);
  document.getElementById('stat-closed').textContent =vals.reduce((s,a)=>s+(a.closed||0),0);
  const soldD=(deals||[]).filter(d=>d.status==='CLOSED');
  const soldT=soldD.reduce((s,d)=>s+d.soldP,0),listT=soldD.reduce((s,d)=>s+d.listP,0);
  document.getElementById('stat-sold-vol').textContent=soldT>0?fmtMoney(soldT):'—';
  document.getElementById('stat-lts-pct').textContent=listT>0?fmtPct((soldT/listT)*100):'—';
}

function renderYTDStandingsForWeek(weekIdx){
  const ytdEl=document.getElementById('ytd-sum-inner');if(!ytdEl)return;
  const ytd=loadYTD();if(!ytd.weeks.length)return;
  const weeksToUse=ytd.weeks.slice(0,weekIdx+1);
  const allDeals=weeksToUse.flatMap(w=>w.deals||[]);
  const ytdRegAgents={};
  weeksToUse.forEach(week=>{
    Object.entries(week.agents||{}).forEach(([key,a])=>{
      if(!ytdRegAgents[key])ytdRegAgents[key]={...a,buyer:0};
      ytdRegAgents[key].closed=Math.max(ytdRegAgents[key].closed||0,a.closed||0);
      ytdRegAgents[key].pend=Math.max(ytdRegAgents[key].pend||0,a.pend||0);

  const selWrap=document.createElement('div');selWrap.style.cssText='position:relative;flex:1;min-width:0';

  ytd.weeks.forEach((w,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent='Wk '+(i+1)+' · '+w.label;if(i===curIdx)opt.selected=true;sel.appendChild(opt);});

  nextBtn.disabled=isLatest;nextBtn.style.opacity=nextBtn.disabled?'0.3':'1';bar.appendChild(nextBtn);

  el.appendChild(bar);
  function goToWeek(idx){
    const y=loadYTD();if(idx<0||idx>=y.weeks.length)return;
    _currentWeekIdx=idx;const w=y.weeks[idx];
    updateStatsBar(w.agents||{},w.deals||[]);
    renderSummary(w.agents||{},w.deals||[],'summary-content');

    REGIONS.forEach(r=>renderAgentList(r.id+'-content',w.agents||{},w.deals||[],r.id,r.color));

  }
  prevBtn.addEventListener('click',()=>goToWeek((_currentWeekIdx>=0?_currentWeekIdx:ytd.weeks.length-1)-1));
  nextBtn.addEventListener('click',()=>goToWeek((_currentWeekIdx>=0?_currentWeekIdx:ytd.weeks.length-1)+1));
  sel.addEventListener('change',function(){goToWeek(parseInt(this.value));});

function renderAll(agentMap,deals,weekDeals){
  window._currentWeekDeals=weekDeals||{};window._currentAgents=agentMap||{};window._currentBuyerRows=window._currentBuyerRows||[];
  updateStatsBar(agentMap,deals);renderWeekNavBar();
  const existingBanner=document.querySelector('.detail-banner');if(existingBanner)existingBanner.remove();
  renderSummary(agentMap,deals,'summary-content');
  if(existingBanner){const summaryEl=document.getElementById('summary-content');const newBanner=summaryEl.querySelector('.detail-banner');if(newBanner)newBanner.replaceWith(existingBanner);else summaryEl.appendChild(existingBanner);}
  REGIONS.forEach(r=>renderAgentList(r.id+'-content',agentMap,deals,r.id,r.color));
  renderYTD();
}

function showTab(id,el,color,afterRender){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(el)el.classList.add('active');
  const ytd=loadYTD();if(!ytd.weeks.length)return;
  const idx=(_currentWeekIdx>=0&&_currentWeekIdx<ytd.weeks.length)?_currentWeekIdx:ytd.weeks.length-1;
  const w=ytd.weeks[idx];
  if(id==='summary'){updateStatsBar(w.agents||{},w.deals||[]);document.getElementById('summary-content').innerHTML='';renderSummary(w.agents||{},w.deals||[],'summary-content');renderYTDStandingsForWeek(idx);}
  else if(id==='ytd'){renderYTDStandingsForWeek(idx);}
  else{
    const r=REGIONS.find(x=>x.id===id);
    if(r) renderAgentList(r.id+'-content',w.agents||{},w.deals||[],r.id,r.color);
  }
  // Run callback after render is complete
  if(afterRender) setTimeout(afterRender, 50);
}
